<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strudel Music Vibe Station - 3D Visualizer</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #050508;
      --card-bg: rgba(12, 12, 18, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent: #d946ef;
      --accent-hover: #f472b6;
      --accent-gradient: linear-gradient(135deg, #d946ef 0%, #3b82f6 100%);
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(at 0% 0%, rgba(217, 70, 239, 0.12) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.12) 0px, transparent 50%);
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 750px;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 2.5rem;
      box-shadow: 0 35px 70px -15px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      align-self: center;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.3s ease;
    }

    .status-dot.playing {
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.2);
        opacity: 0.6;
      }
    }

    /* 3D Visualizer Viewport */
    .visualizer-viewport {
      width: 100%;
      height: 350px;
      background: #020204;
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    button {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 2.5rem;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #btn-play {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.25);
    }

    #btn-play:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(217, 70, 239, 0.45);
    }

    #btn-stop {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #btn-stop:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>

  <!-- Load Strudel & Three.js from CDNs -->
  <script src="https://unpkg.com/@strudel/web@1.0.3"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

  <div class="container">
    <header>
      <h1>Strudel 3D Vibe Station</h1>
      <p class="subtitle">Interactive Real-time 3D Audio-Geometry</p>

      <div class="status-badge">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">SYSTEM OFFLINE</span>
      </div>
    </header>

    <div class="visualizer-viewport" id="canvas-container">
      <!-- Three.js will append the WebGL canvas here -->
    </div>

    <div class="controls">
      <button id="btn-play">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z" />
        </svg>
        Start Vibe
      </button>
      <button id="btn-stop">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
        Hush
      </button>
    </div>
  </div>

  <footer>
    3D Audio Render Engine active • Edit your tracks in JavaScript.js
  </footer>

  <script>
    let rawCode = "";
    let isPlaying = false;

    // Initialize Strudel
    initStrudel();

    const playBtn = document.getElementById('btn-play');
    const stopBtn = document.getElementById('btn-stop');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const container = document.getElementById('canvas-container');

    // === THREE.JS 3D SCENE SETUP ===
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020204, 0.015);

    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 8;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setClearColor(0x020204, 1);
    container.appendChild(renderer.domElement);

    // Create a 3D TorusKnot (Complex music-vibe geometry)
    const geometry = new THREE.TorusKnotGeometry(2.2, 0.6, 120, 16);

    // Store original positions for deformation animations
    const positionAttribute = geometry.attributes.position;
    const originalPositions = new Float32Array(positionAttribute.count * 3);
    for (let i = 0; i < positionAttribute.count * 3; i++) {
      originalPositions[i] = positionAttribute.array[i];
    }

    // Material with vibrant wireframe color and glowing elements
    const wireframeMaterial = new THREE.MeshBasicMaterial({
      color: 0xd946ef,
      wireframe: true,
      transparent: true,
      opacity: 0.6
    });

    const mesh = new THREE.Mesh(geometry, wireframeMaterial);
    scene.add(mesh);

    // Add 3D Floating Particle Field surrounding the model
    const particleGeometry = new THREE.BufferGeometry();
    const particleCount = 200;
    const positions = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount * 3; i += 3) {
      positions[i] = (Math.random() - 0.5) * 20;
      positions[i + 1] = (Math.random() - 0.5) * 20;
      positions[i + 2] = (Math.random() - 0.5) * 20;
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMaterial = new THREE.PointsMaterial({
      size: 0.08,
      color: 0x3b82f6,
      transparent: true,
      opacity: 0.8
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    // Handle Resize
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // 3D Render Loop
    let clock = new THREE.Clock();

    function animate3D() {
      requestAnimationFrame(animate3D);

      const elapsed = clock.getElapsedTime();

      // Auto-rotation speeds up and changes axis when playing
      if (isPlaying) {
        mesh.rotation.x = elapsed * 0.4;
        mesh.rotation.y = elapsed * 0.6;
        particles.rotation.y = elapsed * 0.15;

        // Pulsating glowing wireframe color
        const glowHue = (elapsed * 30) % 360;
        wireframeMaterial.color.setHSL(glowHue / 360, 0.9, 0.6);
        wireframeMaterial.opacity = 0.75 + Math.sin(elapsed * 12) * 0.15;

        // Deform vertices of TorusKnot to simulate music frequency waves
        const timeScale = elapsed * 8;
        const positionsArr = positionAttribute.array;

        for (let i = 0; i < positionAttribute.count; i++) {
          const ix = i * 3;
          const iy = i * 3 + 1;
          const iz = i * 3 + 2;

          const ox = originalPositions[ix];
          const oy = originalPositions[iy];
          const oz = originalPositions[iz];

          // Calculate displacement using wave functions
          const displacement = Math.sin(ox * 2 + timeScale) * Math.cos(oy * 2 - timeScale * 0.5) * 0.25;

          positionsArr[ix] = ox + (ox / 2.2) * displacement;
          positionsArr[iy] = oy + (oy / 2.2) * displacement;
          positionsArr[iz] = oz + (oz / 2.2) * displacement;
        }
        positionAttribute.needsUpdate = true;

        // Dynamic camera zoom/beat reaction
        camera.position.z = 8 + Math.sin(elapsed * 10) * 0.35;
      } else {
        // Slow peaceful ambient idle rotation
        mesh.rotation.x = elapsed * 0.1;
        mesh.rotation.y = elapsed * 0.15;
        particles.rotation.y = elapsed * 0.03;

        wireframeMaterial.color.setHex(0xd946ef);
        wireframeMaterial.opacity = 0.45;

        // Reset vertices back to standard positions
        const positionsArr = positionAttribute.array;
        for (let i = 0; i < positionAttribute.count * 3; i++) {
          positionsArr[i] = originalPositions[i];
        }
        positionAttribute.needsUpdate = true;

        camera.position.z = 8;
      }

      renderer.render(scene, camera);
    }

    animate3D();

    // === MUSIC CONTROLLER ENGINE ===
    async function loadCode() {
      try {
        const response = await fetch('./JavaScript.js');
        if (!response.ok) throw new Error();
        rawCode = await response.text();
      } catch (err) {
        console.error("Could not load code", err);
      }
    }

    playBtn.addEventListener('click', async () => {
      await loadCode();
      if (!rawCode) return;

      try {
        // Start audio
        evaluate(rawCode);

        isPlaying = true;
        statusDot.className = 'status-dot playing';
        statusText.textContent = 'SYSTEM VIBING';
      } catch (err) {
        alert("Strudel Syntax Error: " + err.message);
      }
    });

    stopBtn.addEventListener('click', () => {
      hush();
      isPlaying = false;
      statusDot.className = 'status-dot';
      statusText.textContent = 'SYSTEM OFFLINE';
    });

    // Initial load
    loadCode();
  </script>
</body>

</html>
